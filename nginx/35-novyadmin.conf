    server {
	         listen       4000;
        server_name  localhost;
	    root   /etc/novy/admin;
	    index index.php;
 client_max_body_size 100M;
	 location  / {
		 try_files $uri $uri.php$is_args$query_string;
        }
location /admin_lines/ {
            include fastcgi.conf;
 fastcgi_split_path_info       ^(.+admin_lines)(.*)$;
     fastcgi_param PATH_INFO       $fastcgi_path_info;
     fastcgi_param SCRIPT_FILENAME '/etc/novy/admin/admin_lines.php';
            fastcgi_pass unix:/run/php-fpm/php-fpm.sock;

}
	location ~ .(php)$ {
            include fastcgi.conf;
            fastcgi_pass unix:/run/php-fpm/php-fpm.sock;
        }
		
	   location  ~ .(phphidden)$ {
		   return 404;
        }

        error_page 404  500 502 503 504  /50x.html;
	location = /50x.html {
            alias /etc/novy/shared/50x.html;
        }

	location /shared/ {
		root /etc/novy;
	}

	location /admin_regions/ {
		include fastcgi.conf;
		fastcgi_split_path_info ^(.+admin_regions)(.*)$;
		fastcgi_param PATH_INFO $fastcgi_path_info;
		fastcgi_param SCRIPT_FILENAME '/etc/novy/admin/admin_regions.php';
		fastcgi_pass unix:/run/php-fpm/php-fpm.sock;
	}

	location /discord_callback {
		rewrite ^ /discord_auth.php?action=callback last;
	}

	location /discord_auth {
		rewrite ^ /discord_auth.php?action=$arg_action last;
	}
    }



      server {
 	 server_name  novyadmin.daktoinc.co.uk;
 client_max_body_size 100M;
        listen 443 ssl;
        listen [::]:443 ssl; 
 listen 443 quic; 
  listen [::]:443 quic; 
 add_header Alt-Svc 'h3=:443; ma=864000' ; 
 add_header Alt-Svc 'h3=:443; ma=864000'; 

	ssl_certificate	/etc/cloudflare/pem;
ssl_certificate_key /etc/cloudflare/key;


 error_page   500 502 503 504  /50x.html;
	location = /50x.html {
            alias /etc/novy/shared/50x.html;
        }

	location /img/novymap-qvh.png {
		alias /etc/novy/shared/novymap-qvh.png;
	}

	location / {
       proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
	proxy_set_header X-Forwarded-User $upstream_http_x_auth_request_user;
        proxy_set_header Host "novyadmin.daktoinc.co.uk";
	proxy_redirect http://novyadmin.daktoinc.co.uk:4000/ https://$host:443/;
	    sub_filter 'with &amp;HACK' '';
	    sub_filter 'bulma.min.css">' 'bulma.min.css"><link rel="icon" type="image/png" href="/img/novymap-qvh.png">';
		proxy_pass http://127.0.0.1:4000;
        }



    }



