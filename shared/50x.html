<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>500/404 - Server Meltdown!</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #1e1e1e;
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      background-image: repeating-linear-gradient(45deg, #2c2c2c 0, #2c2c2c 20px, #1e1e1e 20px, #1e1e1e 40px);
    }

    .container {
      max-width: 600px;
      padding: 20px;
      border: 4px solid #ff00ff;
      background-color: #000;
      box-shadow: 0 0 20px #ff00ff;
    }

    h1 {
      font-size: 48px;
      color: #ff4444;
      margin: 0;
    }

    .ascii {
      font-family: monospace;
      white-space: pre;
      color: #0ff;
      margin: 20px 0;
    }

    p {
      color: #fff;
      font-size: 18px;
    }

    .button {
      margin-top: 20px;
      display: inline-block;
      background: #ff00ff;
      color: #000;
      padding: 10px 20px;
      border: 2px solid #fff;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 0 10px #ff00ff;
    }

    .button:hover {
      background: #fff;
      color: #ff00ff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ERROR 500/404</h1>
    <div class="ascii">
      {[( x_x )]}<br>
      /|\\   <br>
     / | \\  <br>
      / \\   <br>
     SERVER PANIC!
    </div>
    <p>Oh no! The server had a meltdown while trying to make tea with the coffee machine...</p>
    <a class="button" href="/" onclick="window.location.href=window.location.href">Try Again?</a>
  </div>
</body>
</html>
